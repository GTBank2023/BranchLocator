<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTBank Tanzania Branch Locator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f6f7fb;
}

.topbar {
  background: #dc4405;
  color: white;
  padding: 16px;
  font-weight: bold;
}

.layout {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 16px;
  padding: 16px;
}

#map {
  height: 80vh;
  border-radius: 12px;
}

#branchList {
  background: white;
  padding: 12px;
  border-radius: 12px;
  max-height: 75vh;
  overflow: auto;
}

.branch-card {
  border: 1px solid #eee;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.direction-link {
  color: #dc4405;
  cursor: pointer;
  font-weight: bold;
}

button {
  padding: 10px;
  border: none;
  background: #dc4405;
  color: white;
  border-radius: 10px;
}

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }
  #map {
    height: 45vh;
  }
}
</style>
</head>

<body>

<div class="topbar">GTBank Tanzania Branch Locator</div>

<div class="layout">
  <div id="map"></div>

  <div>
    <button onclick="useMyLocation()">Use My Location</button>
    <div id="branchList"></div>
  </div>
</div>

<script>
var map = L.map('map').setView([-6.788108, 39.216809], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

var userLat = null;
var userLon = null;

const branches = [
  {
    name: "GTBank Tanzania HQ",
    location: "Morocco – Opposite Vodacom HQ",
    latitude: -6.7769,
    longitude: 39.2599,
    hours: "08:00 - 16:00"
  },
  {
    name: "Posta Branch",
    location: "Posta",
    latitude: -6.8176,
    longitude: 39.2894,
    hours: "08:00 - 16:00"
  }
];

function calculateDistance(lat1, lon1, lat2, lon2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;

  var a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* ✅ ALWAYS SHOW BRANCHES */
function renderBranches() {
  const div = document.getElementById("branchList");
  div.innerHTML = "<h3>Branches</h3>";

  branches.forEach(branch => {
    let distanceText = "Distance unavailable";

    if (userLat !== null) {
      const d = calculateDistance(userLat, userLon, branch.latitude, branch.longitude);
      distanceText = d.toFixed(2) + " km away";
    }

    div.innerHTML += `
      <div class="branch-card">
        <b>${branch.name}</b><br>
        ${branch.location}<br>
        ${distanceText}<br>
        🕒 ${branch.hours}<br>
        <div class="direction-link" onclick="getDirections(${branch.latitude}, ${branch.longitude})">
          Get Directions
        </div>
      </div>
    `;
  });
}

/* ✅ LOCATION BUTTON (OPTIONAL BOOST) */
function useMyLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      L.marker([userLat, userLon])
        .addTo(map)
        .bindPopup("You are here")
        .openPopup();

      map.setView([userLat, userLon], 13);

      renderBranches(); // 🔥 update distances
    },
    err => {
      alert("Location permission denied");
    }
  );
}

/* ✅ DIRECTIONS (ASKS FOR LOCATION IF NEEDED) */
function getDirections(lat, lon) {
  if (!navigator.geolocation) {
    alert("No GPS support");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    if (window.route) {
      map.removeControl(window.route);
    }

    window.route = L.Routing.control({
      waypoints: [
        L.latLng(userLat, userLon),
        L.latLng(lat, lon)
      ],
      addWaypoints: false,
      draggableWaypoints: false
    }).addTo(map);

  }, () => {
    alert("Enable location to get directions");
  });
}

/* 🔥 KEY LINE: SHOW BRANCHES ON LOAD */
renderBranches();
</script>

</body>
</html>
