<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GTBank Tanzania Branch Locator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: #f6f7fb;
}

.topbar {
  background: #dc4405;
  color: white;
  padding: 16px;
  font-weight: 700;
}

.layout {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 16px;
  padding: 16px;
}

#map {
  height: 80vh;
  border-radius: 18px;
}

.side {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #dc4405;
  color: white;
  font-weight: 600;
}

#branchList {
  background: white;
  border-radius: 12px;
  padding: 12px;
  max-height: 70vh;
  overflow-y: auto;
}

.branch-card {
  border: 1px solid #eee;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.direction-link {
  color: #dc4405;
  font-weight: bold;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }

  #map {
    height: 45vh;
  }
}
</style>
</head>

<body>

<div class="topbar">GTBank Tanzania Branch Locator</div>

<div class="layout">
  <div id="map"></div>

  <div class="side">
    <button onclick="useMyLocation()">Use My Location</button>
    <div id="branchList">Tap "Use My Location"</div>
  </div>
</div>

<script>
var map = L.map('map').setView([-6.788108, 39.216809], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

var userLat, userLon;

const branches = [
  {
    name: "GTBank Tanzania HQ",
    location: "Morocco – Opposite Vodacom HQ",
    latitude: -6.7769,
    longitude: 39.2599,
    hours: "08:00 - 16:00"
  },
  {
    name: "Posta Branch",
    location: "Posta",
    latitude: -6.8176,
    longitude: 39.2894,
    hours: "08:00 - 16:00"
  }
];

function calculateDistance(lat1, lon1, lat2, lon2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;

  var a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function showNearbyBranches() {
  const div = document.getElementById("branchList");

  if (!userLat) {
    div.innerHTML = "⚠️ Location not available";
    return;
  }

  div.innerHTML = "<h3>Nearby Branches</h3>";

  branches.forEach(branch => {
    const distance = calculateDistance(userLat, userLon, branch.latitude, branch.longitude);

    div.innerHTML += `
      <div class="branch-card">
        <b>${branch.name}</b><br>
        ${branch.location}<br>
        ${distance.toFixed(2)} km away<br>
        🕒 ${branch.hours}<br>
        <div class="direction-link" onclick="showDirections(${branch.latitude}, ${branch.longitude})">
          Get Directions
        </div>
      </div>
    `;
  });
}

function showDirections(lat, lon) {
  if (!userLat) {
    alert("Enable location first");
    return;
  }

  if (window.route) {
    map.removeControl(window.route);
  }

  window.route = L.Routing.control({
    waypoints: [
      L.latLng(userLat, userLon),
      L.latLng(lat, lon)
    ],
    addWaypoints: false,
    draggableWaypoints: false
  }).addTo(map);
}

function useMyLocation() {
  const div = document.getElementById("branchList");
  div.innerHTML = "📍 Getting your location...";

  if (!navigator.geolocation) {
    div.innerHTML = "❌ Geolocation not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(position) {
      userLat = position.coords.latitude;
      userLon = position.coords.longitude;

      L.marker([userLat, userLon])
        .addTo(map)
        .bindPopup("You are here")
        .openPopup();

      map.setView([userLat, userLon], 13);

      branches.sort((a, b) =>
        calculateDistance(userLat, userLon, a.latitude, a.longitude) -
        calculateDistance(userLat, userLon, b.latitude, b.longitude)
      );

      showNearbyBranches();
    },
    function(error) {
      console.error(error);
      div.innerHTML = "❌ Please allow location access on your phone";
    },
    {
      enableHighAccuracy: true,
      timeout: 10000
    }
  );
}
</script>

</body>
</html>
