<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTBank Tanzania Branch Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Poppins, Arial, sans-serif;
      background: #f6f7fb;
    }

    .topbar {
      background: #dc4405;
      color: white;
      padding: 16px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    #map {
      height: 80vh;
      border-radius: 16px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #dc4405;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    #branchList {
      background: white;
      padding: 12px;
      border-radius: 16px;
      max-height: 75vh;
      overflow: auto;
    }

    .card {
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .name { font-weight: 700; }
    .link { color: #dc4405; cursor: pointer; text-decoration: underline; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      #map { height: 45vh; }
    }
  </style>
</head>

<body>

<div class="topbar">GTBank Branch Locator</div>

<div class="layout">
  <div id="map"></div>

  <div>
    <button onclick="useMyLocation()">Use My Location</button>
    <div id="branchList"></div>
  </div>
</div>

<script>
let map = L.map('map').setView([-6.8, 39.2], 12);

L.tileLayer('https://tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let userLat, userLon;

const branches = [
  {
    name: "GTBank HQ",
    location: "Morocco - Vodacom Area",
    latitude: -6.7769,
    longitude: 39.2599,
    hours: "08:00 - 16:00"
  },
  {
    name: "Posta Branch",
    location: "Posta",
    latitude: -6.8176,
    longitude: 39.2894,
    hours: "08:00 - 16:00"
  }
];

function calculateDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLon = (lon2 - lon1) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function useMyLocation() {
  console.log("Getting location...");

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      console.log("Location:", userLat, userLon);

      L.marker([userLat, userLon])
        .addTo(map)
        .bindPopup("You are here")
        .openPopup();

      branches.sort((a,b) =>
        calculateDistance(userLat,userLon,a.latitude,a.longitude) -
        calculateDistance(userLat,userLon,b.latitude,b.longitude)
      );

      showBranches();
    },
    function(err) {
      console.log(err);
      alert("Allow location access");
    }
  );
}

function showBranches() {
  let div = document.getElementById("branchList");
  div.innerHTML = "<h3>Nearby Branches</h3>";

  branches.forEach(b => {
    let d = calculateDistance(userLat,userLon,b.latitude,b.longitude);

    div.innerHTML += `
      <div class="card">
        <div class="name">${b.name}</div>
        <div>${b.location}</div>
        <div>${d.toFixed(2)} km</div>
        <div>${b.hours}</div>
        <div class="link" onclick="routeTo(${b.latitude},${b.longitude})">
          Get Directions
        </div>
      </div>
    `;
  });
}

function routeTo(lat, lon) {
  navigator.geolocation.getCurrentPosition(pos => {
    let uLat = pos.coords.latitude;
    let uLon = pos.coords.longitude;

    if (window.routeControl) {
      map.removeControl(window.routeControl);
    }

    window.routeControl = L.Routing.control({
      waypoints: [
        L.latLng(uLat, uLon),
        L.latLng(lat, lon)
      ]
    }).addTo(map);
  });
}

useMyLocation();
</script>

</body>
</html>
